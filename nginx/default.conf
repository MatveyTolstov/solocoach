server {
    listen 80;
    server_name solo-coach.ru www.solo-coach.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name solo-coach.ru www.solo-coach.ru;

    ssl_certificate /etc/letsencrypt/live/solo-coach.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solo-coach.ru/privkey.pem;

    location / {
        proxy_pass http://site:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}