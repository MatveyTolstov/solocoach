services:
  db:
    image: postgres:16
    container_name: solocoach_db
    restart: always
    environment:
      POSTGRES_DB: SoloCoach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./SoloCoachApi
      dockerfile: Dockerfile
    container_name: solocoach_api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=SoloCoach;Username=postgres;Password=1;Port=5432
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__User=${SMTP_USER}
      - Smtp__Password=${SMTP_PASSWORD}
      - S3__ServiceUrl=${S3_SERVICE_URL}
      - S3__BucketName=${S3_BUCKET_NAME}
      - S3__Region=${S3_REGION}
      - S3__AccessKey=${S3_ACCESS_KEY}
      - S3__SecretKey=${S3_SECRET_KEY}
      - S3__PublicUrl=${S3_PUBLIC_URL}
      - OpenRouter__ApiKey=${OPENROUTER_API_KEY}
      - OpenRouter__Model=${OPENROUTER_MODEL}
    depends_on:
      - db

  site:
    build:
      context: ./solocoachsite
      dockerfile: Dockerfile
    container_name: solocoach_site
    restart: always
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: solocoach_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - site
      - api

volumes:
  postgres_data: