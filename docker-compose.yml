services:
  db:
    image: postgres:16
    container_name: solocoach_db
    restart: always
    environment:
      POSTGRES_DB: SoloCoach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./SoloCoachApi
      dockerfile: Dockerfile
    container_name: solocoach_api
    restart: always
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=SoloCoach;Username=postgres;Password=1;Port=5432
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__User=solocoachsport@gmail.com
      - Smtp__Password=твой_пароль
    depends_on:
      - db

  site:
    build:
      context: ./solocoachsite
      dockerfile: Dockerfile
    container_name: solocoach_site
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data: